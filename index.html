<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #12151C;
    color: #F1EDE3;
    font-family: 'Manrope', -apple-system, sans-serif;
    overscroll-behavior: none;
    height: 100%;
  }
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Manrope:wght@400;500;600;700&display=swap');

  .page {
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: calc(20px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
  }
  .eyebrow {
    display: flex; align-items: center; gap: 6px;
    color: #E8A33D; font-family: 'Unbounded', sans-serif;
    font-size: 11px; letter-spacing: 0.12em; font-weight: 500; margin-bottom: 10px;
  }
  .weekNav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .weekLabel { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 500; }
  .navBtn {
    background: #1B2029; border: 1px solid #2A3140; border-radius: 10px;
    color: #F1EDE3; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .dayStrip { display: flex; gap: 6px; margin-bottom: 14px; }
  .dayPill {
    flex: 1; background: #1B2029; border: 1px solid #2A3140; border-radius: 12px;
    padding: 8px 4px 10px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer;
  }
  .dayPill.active { background: #E8A33D; border-color: #E8A33D; }
  .dayPillLabel { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 500; }
  .dayPill.active .dayPillLabel, .dayPill.active .dayPillDate { color: #12151C; }
  .dayPillDate { font-size: 11px; color: #8A93A6; }
  .gauge { display: flex; gap: 2px; margin-top: 4px; }
  .tick { width: 2.5px; height: 12px; border-radius: 1px; background: rgba(241,237,227,0.12); }
  .card {
    background: #1B2029; border: 1px solid #2A3140; border-radius: 16px; padding: 16px; margin-bottom: 14px;
  }
  .cardHeader { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .cardTitle { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 500; }
  .cardSub { font-size: 12px; color: #8A93A6; margin-top: 2px; }
  .totalBadge {
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 500; color: #E8A33D;
    background: rgba(232,163,61,0.12); border: 1px solid rgba(232,163,61,0.35); border-radius: 20px;
    padding: 5px 10px; white-space: nowrap;
  }
  .totalBadge.done { color: #7FA68C; background: rgba(127,166,140,0.12); border-color: rgba(127,166,140,0.35); }
  .totalBadge.over { color: #E8604C; background: rgba(232,96,76,0.12); border-color: rgba(232,96,76,0.35); }
  .emptyState { color: #6B7488; font-size: 13px; padding: 14px 2px; }
  .taskList { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .taskRow {
    display: flex; align-items: center; gap: 8px; background: #12151C; border: 1px solid #232938;
    border-radius: 10px; padding: 9px 10px;
  }
  .taskText { flex: 1; font-size: 13.5px; line-height: 1.3; }
  .taskHours { font-size: 12.5px; color: #E8A33D; font-weight: 600; white-space: nowrap; }
  .deleteBtn { background: none; border: none; color: #6B7488; cursor: pointer; padding: 2px; display: flex; font-size: 14px; }
  .addRow { display: flex; gap: 6px; }
  .inputText, .inputHours {
    background: #12151C; border: 1px solid #2A3140; border-radius: 10px; color: #F1EDE3;
    font-size: 16px; font-family: 'Manrope', sans-serif; padding: 10px 12px;
  }
  .inputText { flex: 1; }
  .inputHours { width: 56px; text-align: center; padding: 10px 8px; }
  input:focus { outline: none; border-color: #E8A33D; }
  .addBtn {
    background: #E8A33D; border: none; border-radius: 10px; width: 40px; color: #12151C;
    display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; font-weight: 700;
  }
  .summaryCard { background: #1B2029; border: 1px solid #E8A33D; border-radius: 16px; padding: 16px; }
  .summaryHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .copyBtn {
    display: flex; align-items: center; gap: 6px; background: rgba(232,163,61,0.14);
    border: 1px solid rgba(232,163,61,0.4); border-radius: 20px; padding: 6px 12px;
    color: #E8A33D; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Manrope', sans-serif;
  }
  .summaryPre {
    white-space: pre-wrap; font-family: 'Manrope', sans-serif; font-size: 12.5px; line-height: 1.6;
    color: #C9CDD8; margin: 0;
  }
  .errorBanner {
    margin-top: 12px; background: rgba(232,96,76,0.12); border: 1px solid rgba(232,96,76,0.35);
    color: #E8604C; border-radius: 10px; padding: 10px 12px; font-size: 12.5px;
  }
</style>
</head>
<body>
<div class="page">
  <div class="eyebrow">⏱ ТРУДОЗАТРАТЫ</div>

  <div class="weekNav">
    <button class="navBtn" id="prevWeek" aria-label="Предыдущая неделя">‹</button>
    <div class="weekLabel" id="weekLabel"></div>
    <button class="navBtn" id="nextWeek" aria-label="Следующая неделя">›</button>
  </div>

  <div class="dayStrip" id="dayStrip"></div>

  <div class="card">
    <div class="cardHeader">
      <div>
        <div class="cardTitle" id="cardTitle"></div>
        <div class="cardSub" id="cardSub"></div>
      </div>
      <div class="totalBadge" id="totalBadge"></div>
    </div>
    <div id="cardBody"></div>
  </div>

  <div id="summaryCard"></div>
  <div id="errorBanner"></div>
</div>

<script>
const DAY_OFFSETS = [
  { offset: 0, label: "Пт", full: "Пятница" },
  { offset: 3, label: "Пн", full: "Понедельник" },
  { offset: 4, label: "Вт", full: "Вторник" },
  { offset: 5, label: "Ср", full: "Среда" },
  { offset: 6, label: "Чт", full: "Четверг" },
];
const MONTHS = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
const STORAGE_PREFIX = "worklog:entries:";

function toISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function addDays(d, n) { const nd = new Date(d); nd.setDate(nd.getDate()+n); return nd; }
function currentPeriodStart() {
  const now = new Date();
  const offset = (now.getDay()+2) % 7;
  return addDays(now, -offset);
}
function fmtShort(d) { return `${d.getDate()} ${MONTHS[d.getMonth()]}`; }
function uid() { return Math.random().toString(36).slice(2,9); }

function storageAvailable() {
  try {
    const k = "__test__";
    localStorage.setItem(k, "1");
    localStorage.removeItem(k);
    return true;
  } catch { return false; }
}
const STORAGE_OK = storageAvailable();

function loadDay(iso) {
  if (!STORAGE_OK) return [];
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + iso);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}
function persistDay(iso, list) {
  if (!STORAGE_OK) {
    showError("Хранилище браузера недоступно (возможно, включён приватный режим). Записи сохранятся только до закрытия вкладки.");
    return;
  }
  try {
    localStorage.setItem(STORAGE_PREFIX + iso, JSON.stringify(list));
  } catch (e) {
    showError("Не удалось сохранить: " + (e && e.message ? e.message : e));
  }
}

let periodStart = currentPeriodStart();
let activeOffset = (() => {
  const off = (new Date().getDay()+2) % 7;
  return DAY_OFFSETS.find(d => d.offset === off) ? off : 0;
})();
let entriesByDate = {};

function loadPeriod(start) {
  const results = {};
  for (const d of DAY_OFFSETS) {
    const iso = toISO(addDays(start, d.offset));
    results[iso] = loadDay(iso);
  }
  entriesByDate = results;
  render();
}

function saveDay(iso, list) {
  entriesByDate[iso] = list;
  persistDay(iso, list);
  render();
}

function showError(msg) {
  document.getElementById('errorBanner').innerHTML = `<div class="errorBanner">${escapeHtml(msg)}</div>`;
  setTimeout(() => { document.getElementById('errorBanner').innerHTML = ""; }, 5000);
}

function dayTotal(iso) {
  return (entriesByDate[iso] || []).reduce((s,t) => s + t.hours, 0);
}

function buildSummary(dates) {
  const lines = [];
  for (const d of dates) {
    const iso = toISO(d.date);
    const list = entriesByDate[iso] || [];
    lines.push(`${d.full}, ${fmtShort(d.date)} — ${dayTotal(iso)} ч.`);
    if (list.length === 0) lines.push("  (пусто)");
    else list.forEach(t => lines.push(`  – ${t.text} (${t.hours} ч.)`));
  }
  return lines.join("\n");
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function render() {
  const dates = DAY_OFFSETS.map(d => ({...d, date: addDays(periodStart, d.offset)}));
  const active = dates.find(d => d.offset === activeOffset);
  const activeISO = toISO(active.date);
  const isThursday = activeOffset === 6;

  document.getElementById('weekLabel').textContent = `${fmtShort(dates[0].date)} — ${fmtShort(dates[4].date)}`;

  const strip = document.getElementById('dayStrip');
  strip.innerHTML = "";
  dates.forEach(d => {
    const iso = toISO(d.date);
    const total = dayTotal(iso);
    const isActive = d.offset === activeOffset;
    const pill = document.createElement('button');
    pill.className = 'dayPill' + (isActive ? ' active' : '');
    let ticksHtml = "";
    for (let i = 0; i < 8; i++) {
      const filled = i < Math.floor(total) || (i < total && total % 1 !== 0);
      let bg = 'rgba(241,237,227,0.12)';
      if (isActive) bg = filled ? '#12151C' : 'rgba(18,21,28,0.18)';
      else if (filled) bg = total > 8 ? '#E8604C' : '#E8A33D';
      ticksHtml += `<div class="tick" style="background:${bg}"></div>`;
    }
    pill.innerHTML = `
      <span class="dayPillLabel">${d.label}</span>
      <span class="dayPillDate">${d.date.getDate()}</span>
      <div class="gauge">${ticksHtml}</div>
    `;
    pill.onclick = () => { activeOffset = d.offset; render(); };
    strip.appendChild(pill);
  });

  document.getElementById('cardTitle').textContent = active.full;
  document.getElementById('cardSub').textContent = fmtShort(active.date);

  const activeTotal = dayTotal(activeISO);
  const badge = document.getElementById('totalBadge');
  badge.textContent = `${activeTotal} / 8 ч`;
  badge.className = 'totalBadge' + (activeTotal > 8 ? ' over' : activeTotal === 8 ? ' done' : '');

  const body = document.getElementById('cardBody');
  const list = entriesByDate[activeISO] || [];
  const isFuture = active.date > new Date(new Date().setHours(23,59,59,999));
  let html = `<div class="taskList">`;
  if (list.length === 0) {
    html += `<div class="emptyState">Пока ничего не записано.${isFuture ? " Этот день ещё впереди." : " Добавь, чем занимался."}</div>`;
  } else {
    list.forEach(t => {
      html += `
        <div class="taskRow">
          <span class="taskText">${escapeHtml(t.text)}</span>
          <span class="taskHours">${t.hours} ч</span>
          <button class="deleteBtn" data-id="${t.id}" aria-label="Удалить">✕</button>
        </div>`;
    });
  }
  html += `</div>
    <div class="addRow">
      <input class="inputText" id="taskText" placeholder="Чем занимался?" autocomplete="off" />
      <input class="inputHours" id="taskHours" placeholder="ч" inputmode="decimal" autocomplete="off" />
      <button class="addBtn" id="addBtn" aria-label="Добавить">+</button>
    </div>`;
  body.innerHTML = html;

  body.querySelectorAll('.deleteBtn').forEach(btn => {
    btn.onclick = () => {
      const list = entriesByDate[activeISO] || [];
      saveDay(activeISO, list.filter(t => t.id !== btn.dataset.id));
    };
  });
  const addBtn = document.getElementById('addBtn');
  const doAdd = () => {
    const textEl = document.getElementById('taskText');
    const hoursEl = document.getElementById('taskHours');
    const text = textEl.value.trim();
    const hours = parseFloat(hoursEl.value.replace(",", "."));
    if (!text || !hours || hours <= 0) return;
    const list = entriesByDate[activeISO] || [];
    saveDay(activeISO, [...list, {id: uid(), text, hours}]);
  };
  addBtn.onclick = doAdd;
  document.getElementById('taskText').onkeydown = e => e.key === 'Enter' && doAdd();
  document.getElementById('taskHours').onkeydown = e => e.key === 'Enter' && doAdd();

  const summaryEl = document.getElementById('summaryCard');
  if (isThursday) {
    summaryEl.innerHTML = `
      <div class="summaryCard">
        <div class="summaryHeader">
          <div class="cardTitle">Итог за неделю</div>
          <button class="copyBtn" id="copyBtn">Копировать</button>
        </div>
        <pre class="summaryPre">${escapeHtml(buildSummary(dates))}</pre>
      </div>`;
    document.getElementById('copyBtn').onclick = async () => {
      try {
        await navigator.clipboard.writeText(buildSummary(dates));
        const btn = document.getElementById('copyBtn');
        btn.textContent = "Скопировано";
        setTimeout(() => { btn.textContent = "Копировать"; }, 1800);
      } catch { showError("Не удалось скопировать"); }
    };
  } else {
    summaryEl.innerHTML = "";
  }
}

document.getElementById('prevWeek').onclick = () => { periodStart = addDays(periodStart, -7); loadPeriod(periodStart); };
document.getElementById('nextWeek').onclick = () => { periodStart = addDays(periodStart, 7); loadPeriod(periodStart); };

if (!STORAGE_OK) {
  showError("Хранилище браузера недоступно (возможно, включён приватный режим). Записи сохранятся только до закрытия вкладки.");
}
loadPeriod(periodStart);
</script>
</body>
</html>
